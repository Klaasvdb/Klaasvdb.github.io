<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Trouw Klanke — Uitnodiging</title>
<style>
  :root {
    --paper: #fdfcf7;
    --paper-shadow: rgba(40, 30, 20, 0.18);
    --bg-1: #e8e0d2;
    --bg-2: #d4c8b3;
    --ink: #2a3a52;
    --accent: #8a7a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: radial-gradient(ellipse at center, var(--bg-1) 0%, var(--bg-2) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
  }

  /* Subtle paper texture on background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .stage {
    position: relative;
    perspective: 2400px;
    z-index: 1;
  }

  /* Book dimensions — A5 ratio (1:1.414) */
  .book {
    position: relative;
    width: 880px;     /* two pages side-by-side when open */
    height: 622px;
    transform-style: preserve-3d;
    transition: transform 0.6s ease;
  }

  /* Soft shadow under the book */
  .book::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: 5%;
    right: 5%;
    height: 40px;
    background: radial-gradient(ellipse at center, rgba(40,30,20,0.35) 0%, transparent 70%);
    filter: blur(8px);
    z-index: -1;
  }

  /* Each page is a half */
  .page {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: var(--paper);
    overflow: hidden;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* The fixed back-right page (page 3 — back cover, visible when book is open) */
  .page-back-right {
    right: 0;
    background-image: url('images/Uitnodiging_KLANKE_3_avond.png');
    box-shadow:
      inset 12px 0 24px -12px rgba(0,0,0,0.25),
      2px 2px 8px rgba(0,0,0,0.1);
  }

  /* The fixed back-left page (back of cover when flipped, shown after flip) */
  .page-back-left {
    left: 0;
    background-image: url('images/Uitnodiging_KLANKE_2_avond.png');
    box-shadow:
      inset -12px 0 24px -12px rgba(0,0,0,0.25),
      -2px 2px 8px rgba(0,0,0,0.1);
  }

  /* The flipping cover */
  .flipper {
    position: absolute;
    left: 50%;
    top: 0;
    width: 50%;
    height: 100%;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    z-index: 10;
    cursor: pointer;
  }

  .flipper.flipped {
    transform: rotateY(-180deg);
  }

  .flipper-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: var(--paper);
  }

  /* Front of cover — image 1 */
  .flipper-front {
    background-image: url('images/Uitnodiging_KLANKE_1.png');
    box-shadow:
      inset -12px 0 24px -12px rgba(0,0,0,0.18),
      2px 2px 8px rgba(0,0,0,0.1);
  }

  /* Back of cover — image 2 (left page when opened) */
  .flipper-back {
    transform: rotateY(180deg);
    background-image: url('images/Uitnodiging_KLANKE_2_avond.png');
    box-shadow:
      inset 12px 0 24px -12px rgba(0,0,0,0.25);
  }

  /* The center binding line / spine effect */
  .book::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 4px;
    transform: translateX(-50%);
    background: linear-gradient(to right,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.25) 50%,
      rgba(0,0,0,0.15) 100%);
    z-index: 5;
    pointer-events: none;
  }

  /* Page curl hint on cover when not flipped */
  .flipper:not(.flipped) .flipper-front::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 60px;
    height: 60px;
    background: linear-gradient(225deg,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.05) 30%,
      transparent 50%);
    transition: all 0.3s ease;
  }

  .flipper:not(.flipped):hover .flipper-front::after {
    width: 90px;
    height: 90px;
  }

  /* Clickable area for the QR-link area on page 3 (back-right) */
  .page-back-right {
    position: absolute;
    right: 0;
  }

  .qr-link {
    position: absolute;
    /* These coordinates roughly cover the QR + URL block in the lower-middle of image 3 */
    left: 38%;
    top: 65%;
    width: 30%;
    height: 22%;
    z-index: 3;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .qr-link:hover {
    background: rgba(74, 119, 167, 0.12);
    transform: scale(1.02);
  }

  .qr-link:focus {
    outline: 2px dashed var(--ink);
    outline-offset: 4px;
  }

  /* Controls below */
  .controls {
    margin-top: 3rem;
    display: flex;
    gap: 1rem;
    z-index: 1;
  }

  .btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.75rem 1.6rem;
    font-family: Georgia, serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .btn:active {
    transform: translateY(0);
  }

  .hint {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    color: var(--ink);
    opacity: 0.55;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: Georgia, serif;
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="book" id="book">
      <!-- Back-left page: shows image 2 once cover is flipped open -->
      <div class="page page-back-left"></div>

      <!-- Back-right page: shows image 3 (always visible behind the cover) -->
      <div class="page page-back-right">
        <a class="qr-link"
           href="https://klanke.be/dansen"
           target="_blank"
           rel="noopener"
           aria-label="Open klanke.be/dansen"
           title="Open klanke.be/dansen"></a>
      </div>

      <!-- The flipping cover -->
      <div class="flipper" id="flipper">
        <div class="flipper-face flipper-front"></div>
        <div class="flipper-face flipper-back"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="toggleBtn">Open boekje</button>
  </div>

  <div class="hint">Klik op de voorkant om te openen</div>

<script>
  const flipper = document.getElementById('flipper');
  const btn = document.getElementById('toggleBtn');

  function toggle() {
    flipper.classList.toggle('flipped');
    btn.textContent = flipper.classList.contains('flipped')
      ? 'Sluit boekje'
      : 'Open boekje';
  }

  flipper.addEventListener('click', toggle);
  btn.addEventListener('click', toggle);
</script>

</body>
</html>
