<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naam A &amp; Naam B trouwen! 💍</title>
<script src="/config.js"></script>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
  :root {
    --paper: #faf7f2;
    --ink: #2a2118;
    --ink-light: #6a5a4a;
    --pastel-pink: #f4a7b0;
    --pastel-blue: #a8c8e8;
    --pastel-green: #a8d8b0;
    --pastel-yellow: #f8e4a0;
    --pastel-lavender: #c8b8e8;
    --pastel-peach: #f8c8a0;
    --font-sketch: 'Segoe Print','Bradley Hand','Comic Sans MS',cursive;
    --font-body: 'Trebuchet MS','Gill Sans',Verdana,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font-body);background:var(--paper);color:var(--ink);overflow-x:hidden;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255,240,210,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(255,230,190,0.4) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 10%, rgba(250,245,225,0.5) 0%, transparent 50%),
      #faf7f2;
  }
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;}

  /* HAND-DRAWN BORDERS — organic imperfect corners */
  .rsvp-form, .card, .cd-block, .hero-badge, .date-pill,
  .tog-btn, .submit-btn, .deadline-note, .ics-btn {
    outline: none !important;
    border: 2px solid var(--ink) !important;
    border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px !important;
    position: relative;
  }
  /* Second wobbly border layer via ::before */
  .rsvp-form::before, .card::before, .cd-block::before,
  .hero-badge::before, .date-pill::before, .tog-btn::before,
  .submit-btn::before, .deadline-note::before {
    content: '';
    position: absolute;
    inset: -4px;
    border: 1.5px solid var(--ink);
    border-radius: 15px 225px 15px 255px / 225px 15px 255px 15px;
    opacity: 0.25;
    pointer-events: none;
  }
  .rsvp-form::after, .card::after, .cd-block::after,
  .hero-badge::after, .date-pill::after, .tog-btn::after,
  .submit-btn::after, .deadline-note::after, .ics-btn::after {
    display: none !important;
  }

  /* Floating illustrations */
  .sketch-floats{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .sketch-float{position:absolute;opacity:0.15;animation:floatSketchy linear infinite;}
  @keyframes floatSketchy{0%{transform:translateY(110vh) rotate(0deg)}100%{transform:translateY(-15vh) rotate(20deg)}}
  .f1{width:60px;left:5%;animation-duration:28s;animation-delay:-4s}
  .f2{width:70px;left:15%;animation-duration:22s;animation-delay:-10s}
  .f3{width:45px;left:30%;animation-duration:32s;animation-delay:-2s}
  .f4{width:55px;left:48%;animation-duration:25s;animation-delay:-15s}
  .f5{width:65px;left:62%;animation-duration:30s;animation-delay:-7s}
  .f6{width:40px;left:75%;animation-duration:20s;animation-delay:-12s}
  .f7{width:55px;left:85%;animation-duration:27s;animation-delay:-3s}
  .f8{width:45px;left:92%;animation-duration:24s;animation-delay:-18s}
  .f9{width:120px;left:2%;animation-duration:35s;animation-delay:-8s}
  .f10{width:50px;left:22%;animation-duration:38s;animation-delay:-22s}
  .f11{width:60px;left:40%;animation-duration:18s;animation-delay:-5s}
  .f12{width:40px;left:55%;animation-duration:15s;animation-delay:-11s}
  .f13{width:35px;left:70%;animation-duration:22s;animation-delay:-16s}
  .f14{width:45px;left:80%;animation-duration:40s;animation-delay:-28s}
  .f15{width:100px;left:60%;animation-duration:32s;animation-delay:-6s}
  .f16{width:65px;left:8%;animation-duration:26s;animation-delay:-14s}
  .f17{width:45px;left:35%;animation-duration:34s;animation-delay:-20s}
  .f18{width:75px;left:50%;animation-duration:42s;animation-delay:-9s}
  .f19{width:35px;left:88%;animation-duration:21s;animation-delay:-3s}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes wiggle{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .fade-up{animation:fadeUp 0.5s ease both}
  .fade-up-1{animation-delay:0.1s}.fade-up-2{animation-delay:0.2s}.fade-up-3{animation-delay:0.3s}.fade-up-4{animation-delay:0.4s}

  /* HERO */
  .hero{position:relative;z-index:1;text-align:center;padding:70px 20px 50px}
  .hero-badge{display:inline-block;background:var(--pastel-yellow);color:var(--ink);font-family:var(--font-sketch);font-size:0.85rem;padding:6px 18px;margin-bottom:20px;position:relative;}
  .hero-badge::before{content:'';position:absolute;inset:-2px;border:2px solid var(--ink);transform:rotate(-0.8deg)}
  .hero-badge::after{content:'';position:absolute;inset:-2px;border:1.5px solid var(--ink);transform:rotate(0.6deg);opacity:0.4}
  .names{font-family:var(--font-sketch);font-size:clamp(2.5rem,8vw,5.5rem);line-height:1.15;margin-bottom:12px;}
  .name-a{color:var(--ink);position:relative;display:inline-block}
  .name-a::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:7px;background:var(--pastel-pink);opacity:0.7;transform:rotate(-0.5deg);border-radius:3px;z-index:-1}
  .name-b{color:var(--ink);position:relative;display:inline-block}
  .name-b::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:7px;background:var(--pastel-lavender);opacity:0.7;transform:rotate(0.5deg);border-radius:3px;z-index:-1}
  .ampersand{color:var(--ink-light);display:inline-block;animation:wiggle 4s ease-in-out infinite;font-size:0.8em}
  .date-pill{display:inline-block;background:var(--pastel-green);color:var(--ink);font-family:var(--font-sketch);font-size:1.15rem;padding:10px 28px;position:relative;margin:16px 0}
  .date-pill::before{content:'';position:absolute;inset:-2px;border:2px solid var(--ink);transform:rotate(-0.4deg)}
  .location-tag{font-family:var(--font-sketch);font-size:0.95rem;color:var(--ink-light);margin-top:8px}

  /* INFO CARDS */
  .cards{position:relative;z-index:1;display:flex;flex-wrap:wrap;justify-content:center;gap:24px;padding:40px 20px;max-width:900px;margin:0 auto}
  .card{background:white;padding:24px 28px;text-align:center;flex:1 1 200px;max-width:240px;position:relative;transition:transform 0.2s}
  .card::before{content:'';position:absolute;inset:-2px;border:2.5px solid var(--ink);transform:rotate(-0.6deg)}
  .card::after{content:'';position:absolute;inset:-2px;border:2px solid var(--ink);transform:rotate(0.8deg);opacity:0.35}
  .card:hover{transform:rotate(-1deg) scale(1.02)}
  .card:nth-child(1){background:#fff8f8}.card:nth-child(2){background:#f8fff8}
  .card:nth-child(3){background:#fffff0}.card:nth-child(4){background:#f8f8ff}
  .card-icon{font-size:2.2rem;margin-bottom:10px}
  .card h3{font-family:var(--font-sketch);font-size:0.8rem;letter-spacing:0.06em;color:var(--ink-light);margin-bottom:6px;text-transform:uppercase}
  .card p{font-size:0.95rem;font-weight:600;color:var(--ink);line-height:1.4}

  /* COUNTDOWN */
  .countdown-section{position:relative;z-index:1;text-align:center;padding:20px 20px 50px}
  .countdown-label{font-family:var(--font-sketch);font-size:1rem;color:var(--ink-light);margin-bottom:20px}
  .countdown{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
  .cd-block{background:white;padding:14px 20px;min-width:85px;position:relative}
  .cd-block::before{content:'';position:absolute;inset:-2px;border:2px solid var(--ink);transform:rotate(-0.5deg)}
  .cd-number{font-family:var(--font-sketch);font-size:2.3rem;line-height:1;color:var(--ink)}
  .cd-unit{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-light);margin-top:4px;font-family:var(--font-sketch)}

  /* RSVP */
  .rsvp-section{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:10px 20px 80px}
  .rsvp-header{text-align:center;margin-bottom:28px}
  .rsvp-header h2{font-family:var(--font-sketch);font-size:clamp(1.8rem,5vw,2.8rem);color:var(--ink);margin-bottom:8px;position:relative;display:inline-block}
  .rsvp-header h2::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:8px;background:var(--pastel-pink);opacity:0.6;transform:rotate(-0.5deg);border-radius:3px;z-index:-1}
  .rsvp-header p{font-family:var(--font-sketch);color:var(--ink-light);font-size:0.95rem}
  .rsvp-form{background:white;padding:32px;position:relative}
  .rsvp-form::before{content:'';position:absolute;inset:-3px;border:2.5px solid var(--ink);transform:rotate(-0.3deg)}
  .rsvp-form::after{content:'';position:absolute;inset:-3px;border:2px solid var(--ink);transform:rotate(0.5deg);opacity:0.4}

  .field-group{margin-bottom:22px;position:relative;z-index:1}
  .field-label{display:block;font-family:var(--font-sketch);font-size:0.9rem;margin-bottom:8px;color:var(--ink-light)}

  input[type="text"],input[type="email"],textarea{width:100%;padding:8px 4px;background:transparent;border:none;border-bottom:2px solid var(--ink);font-family:var(--font-body);font-size:1rem;color:var(--ink);outline:none;transition:border-color 0.2s}
  input:focus,textarea:focus{border-bottom-color:var(--pastel-pink)}
  input::placeholder,textarea::placeholder{color:#ccc;font-style:italic}
  textarea{border:2px solid var(--ink);padding:10px;resize:vertical;min-height:80px}

  .toggle-row{display:flex;gap:10px;flex-wrap:wrap}
  .tog-btn{flex:1;padding:10px 14px;background:var(--paper);border:none;font-family:var(--font-sketch);font-size:0.9rem;cursor:pointer;color:var(--ink);transition:transform 0.15s;position:relative;min-width:100px}
  .tog-btn::before{content:'';position:absolute;inset:-2px;border:2px solid var(--ink);transform:rotate(-0.5deg)}
  .tog-btn::after{content:'';position:absolute;inset:-2px;border:1.5px solid var(--ink);transform:rotate(0.7deg);opacity:0.4}
  .tog-btn:hover{transform:translateY(-2px) rotate(-0.5deg)}
  .tog-btn.yes{background:#d8f0dc}
  .tog-btn.no{background:#f8d8d8}
  .tog-btn.sel{background:#e4d8f4}
  .tog-btn.camp{background:#d4ecf8}
  .tog-btn.nocamp{background:#fce8d0}

  /* Color wheel */
  .color-wheel-wrapper{display:flex;flex-direction:column;align-items:center;gap:14px}
  .wheel-canvas{border-radius:50%;border:2.5px solid var(--ink);box-shadow:3px 3px 0 rgba(0,0,0,0.1);cursor:crosshair;touch-action:none}
  .color-wheel-bottom{display:flex;align-items:center;gap:14px;width:100%}
  .color-swatch{width:42px;height:42px;border-radius:50%;border:2.5px solid var(--ink);flex-shrink:0;transition:background 0.1s}
  .color-hex-label{font-family:var(--font-sketch);font-size:0.9rem;color:var(--ink-light)}

  /* ICS */
  .ics-btn{display:inline-flex;align-items:center;gap:10px;margin-top:16px;padding:10px 22px;background:var(--pastel-blue);color:var(--ink);border:none;font-family:var(--font-sketch);font-size:0.9rem;cursor:pointer;text-decoration:none;position:relative}
  .ics-btn::before{content:'';position:absolute;inset:-2px;border:2px solid var(--ink);transform:rotate(-0.5deg)}

  /* Submit */
  .submit-btn{width:100%;padding:15px;background:var(--pastel-pink);color:var(--ink);border:none;font-family:var(--font-sketch);font-size:1.05rem;cursor:pointer;position:relative;transition:transform 0.15s;margin-top:8px}
  .submit-btn::before{content:'';position:absolute;inset:-3px;border:2.5px solid var(--ink);transform:rotate(-0.4deg)}
  .submit-btn::after{content:'';position:absolute;inset:-3px;border:2px solid var(--ink);transform:rotate(0.6deg);opacity:0.4}
  .submit-btn:hover{transform:rotate(-0.5deg) scale(1.01)}

  /* Success */
  .success-msg{display:none;text-align:center;padding:36px 16px}
  .success-msg .big-emoji{font-size:4.5rem;display:inline-block;animation:wiggle 1.5s ease-in-out infinite}
  .success-msg h3{font-family:var(--font-sketch);font-size:1.8rem;color:var(--ink);margin:14px 0 8px;position:relative;display:inline-block}
  .success-msg h3::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:6px;background:var(--pastel-green);opacity:0.6;border-radius:3px;z-index:-1}
  .success-msg p{font-size:0.95rem;color:var(--ink-light)}

  /* Deadline */
  .deadline-note{text-align:center;margin-top:24px;font-family:var(--font-sketch);font-size:1.05rem;color:var(--ink);background:var(--pastel-yellow);padding:14px 20px;position:relative}
  .deadline-note::before{content:'';position:absolute;inset:-2px;border:2px solid var(--ink);transform:rotate(-0.3deg)}
  .deadline-note strong{color:#b04020}

  footer{position:relative;z-index:1;text-align:center;padding:28px 20px;font-family:var(--font-sketch);font-size:0.9rem;color:var(--ink-light)}

  .hidden{display:none!important}
  @media(max-width:500px){.toggle-row{flex-direction:column}.card{max-width:100%}.wheel-canvas{width:180px!important;height:180px!important}}

  /* PROGRAMME TIMELINE */
  .programme-wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:30px 20px 20px}
  .programme{position:relative;padding-left:20px}
  .programme::before{content:'';position:absolute;left:80px;top:8px;bottom:8px;width:2px;background:var(--ink);opacity:0.15;filter:url(#squiggle)}
  .prog-item{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px;animation:fadeUp 0.4s ease both}
  .prog-time{font-family:var(--font-sketch);font-size:0.95rem;color:var(--ink-light);width:52px;flex-shrink:0;text-align:right;padding-top:2px}
  .prog-icon{font-size:1.4rem;width:32px;flex-shrink:0;text-align:center;position:relative;z-index:1}
  .prog-label{font-family:var(--font-sketch);font-size:0.95rem;color:var(--ink);line-height:1.4}
  .prog-label small{font-size:0.8rem;color:var(--ink-light)}
  .prog-highlight .prog-label{color:var(--ink);font-size:1rem}
  .prog-highlight .prog-icon{background:var(--pastel-yellow);border-radius:50%;padding:2px;outline:2px solid var(--ink);filter:url(#squiggle)}
  .prog-camping{opacity:0.7}
  .parking-note{margin-top:16px;font-family:var(--font-sketch);font-size:0.9rem;color:var(--ink-light);text-align:center;padding:10px 16px;background:var(--pastel-blue);opacity:0.85;position:relative;outline:2px solid var(--ink);filter:url(#squiggle)}

  /* Mobile colour preview bubble */
  .color-thumb-preview {
    display: none;
    position: fixed;
    width: 80px;
    height: 80px;
    border-radius: 50% 50% 50% 0%;
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -120%) rotate(-45deg);
    transition: background 0.05s;
    filter: url(#squiggle);
  }
  .color-thumb-preview.visible { display: block; }
  .color-thumb-preview-label {
    display: none;
    position: fixed;
    font-family: var(--font-sketch);
    font-size: 0.8rem;
    color: var(--ink);
    pointer-events: none;
    z-index: 10001;
    transform: translate(-50%, -260%);
    background: white;
    padding: 2px 8px;
    border: 1.5px solid var(--ink);
    filter: url(#squiggle);
  }
  .color-thumb-preview-label.visible { display: block; }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="squiggle" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="turbulence" baseFrequency="0.006 0.012" numOctaves="2" seed="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>
</svg>
<div class="color-thumb-preview" id="thumbPreview"></div>
<div class="color-thumb-preview-label" id="thumbPreviewLabel"></div>
<div class="sketch-floats" aria-hidden="true">
  <svg class="sketch-float f1" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><path d="M20 8 Q18 28 26 38 L22 62 M38 8 Q40 28 32 38 L36 62"/><path d="M16 62 L44 62"/><path d="M14 8 L46 8 Q44 28 30 38 Q16 28 14 8Z"/><path d="M22 18 Q26 14 30 18 Q34 14 38 18"/><circle cx="24" cy="14" r="1.5"/><circle cx="30" cy="11" r="1"/><circle cx="36" cy="15" r="1.5"/></g></svg>
  <svg class="sketch-float f2" viewBox="0 0 70 40" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2.5" stroke-linecap="round"><ellipse cx="22" cy="20" rx="18" ry="10"/><ellipse cx="48" cy="20" rx="18" ry="10"/><path d="M34 14 Q38 20 34 26" stroke-width="3" stroke="#faf7f2"/><path d="M36 14 Q32 20 36 26" stroke-width="3" stroke="#faf7f2"/><path d="M34 14 Q38 20 34 26"/><path d="M36 14 Q32 20 36 26"/></g></svg>
  <svg class="sketch-float f3" viewBox="0 0 50 60" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><path d="M20 44 L20 16 L40 12 L40 40"/><ellipse cx="17" cy="46" rx="6" ry="4" transform="rotate(-15 17 46)"/><ellipse cx="37" cy="42" rx="6" ry="4" transform="rotate(-15 37 42)"/></g></svg>
  <svg class="sketch-float f4" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><circle cx="30" cy="30" r="6"/><ellipse cx="30" cy="14" rx="5" ry="8"/><ellipse cx="30" cy="46" rx="5" ry="8"/><ellipse cx="14" cy="30" rx="8" ry="5"/><ellipse cx="46" cy="30" rx="8" ry="5"/><ellipse cx="19" cy="19" rx="5" ry="8" transform="rotate(45 19 19)"/><ellipse cx="41" cy="41" rx="5" ry="8" transform="rotate(45 41 41)"/><ellipse cx="41" cy="19" rx="5" ry="8" transform="rotate(-45 41 19)"/><ellipse cx="19" cy="41" rx="5" ry="8" transform="rotate(-45 19 41)"/></g></svg>
  <svg class="sketch-float f5" viewBox="0 0 70 50" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><path d="M4 44 L35 8 L66 44 Z"/><path d="M22 44 L35 24 L48 44"/><path d="M4 44 L66 44"/><path d="M35 8 L35 4"/><path d="M20 6 L35 4 L50 6"/></g></svg>
  <svg class="sketch-float f6" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><path d="M25 6 L28 18 L41 18 L31 26 L34 38 L25 30 L16 38 L19 26 L9 18 L22 18 Z"/></g></svg>
  <!-- Ice cream cone -->
  <svg class="sketch-float f7" viewBox="0 0 50 70" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><path d="M10 32 L25 64 L40 32 Z"/><path d="M12 36 L38 36"/><circle cx="25" cy="20" r="12"/><circle cx="18" cy="16" r="7"/><circle cx="32" cy="16" r="7"/><path d="M16 10 Q18 6 20 10"/><path d="M30 10 Q32 6 34 10"/></g></svg>

  <!-- Camera -->
  <svg class="sketch-float f16" viewBox="0 0 70 55" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><rect x="4" y="16" width="62" height="36" rx="4"/><path d="M22 16 L26 8 L44 8 L48 16"/><circle cx="35" cy="34" r="12"/><circle cx="35" cy="34" r="7"/><circle cx="55" cy="24" r="4"/><circle cx="14" cy="24" r="2"/></g></svg>

  <!-- Calculator -->
  <svg class="sketch-float f17" viewBox="0 0 50 70" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#b8a888" stroke-width="2" stroke-linecap="round"><rect x="6" y="4" width="38" height="62" rx="4"/><rect x="12" y="10" width="26" height="14" rx="2"/><circle cx="18" cy="36" r="3"/><circle cx="25" cy="36" r="3"/><circle cx="32" cy="36" r="3"/><circle cx="18" cy="46" r="3"/><circle cx="25" cy="46" r="3"/><circle cx="32" cy="46" r="3"/><circle cx="18" cy="56" r="3"/><circle cx="25" cy="56" r="3"/><rect x="29" y="53" width="6" height="6" rx="1"/></g></svg>

  <!-- Extra tent -->

    <span class="ampersand"> &amp; </span>
    <span class="name-b" id="cfg-naam-b"></span>
  </div>
  <div class="date-pill fade-up fade-up-2">📅 &nbsp;<span id="cfg-datum"></span></div>
  <div class="location-tag fade-up fade-up-3">📍 <span id="cfg-locatie"></span></div>
</section>

<div class="programme-wrap">
  <div class="programme">
    <div class="prog-item"><span class="prog-time" id="cfg-welkom-tijd"></span><span class="prog-icon">🚪</span><span class="prog-label">Welkom</span></div>
    <div class="prog-item"><span class="prog-time" id="cfg-ceremonie-tijd"></span><span class="prog-icon">💍</span><span class="prog-label">Ceremonie<br><small id="cfg-ceremonie-loc"></small></span></div>
    <div class="prog-item"><span class="prog-time" id="cfg-receptie-tijd"></span><span class="prog-icon">🥂</span><span class="prog-label">Receptie<br><small id="cfg-receptie-loc"></small></span></div>
    <div class="prog-item"><span class="prog-time" id="cfg-diner-tijd"></span><span class="prog-icon">🍽️</span><span class="prog-label">Diner</span></div>
    <div class="prog-item prog-highlight"><span class="prog-time" id="cfg-dessert-tijd"></span><span class="prog-icon">🍰</span><span class="prog-label">Dessert<br><small>avondgasten welkom!</small></span></div>
    <div class="prog-item"><span class="prog-time" id="cfg-openingsdans-tijd"></span><span class="prog-icon">💃</span><span class="prog-label">Openingsdans</span></div>
    <div class="prog-item prog-camping"><span class="prog-time">volgende dag</span><span class="prog-icon">🍳</span><span class="prog-label">Ontbijt op camping<br><small id="cfg-ontbijt-tijd"></small></span></div>
  </div>
  <div class="parking-note"><span>🚗</span> <span id="cfg-parking"></span></div>

    <div class="cd-block"><div class="cd-number" id="cd-days">—</div><div class="cd-unit">dagen</div></div>
    <div class="cd-block"><div class="cd-number" id="cd-hours">—</div><div class="cd-unit">uren</div></div>
    <div class="cd-block"><div class="cd-number" id="cd-mins">—</div><div class="cd-unit">minuten</div></div>
    <div class="cd-block"><div class="cd-number" id="cd-secs">—</div><div class="cd-unit">seconden</div></div>
  </div>
</div>

<footer>met veel ♥ gemaakt · <span id="cfg-namen-footer"></span></footer>
<script>
  const wd=new Date(CONFIG.datum_iso);
  function upd(){const diff=wd-new Date();if(diff<=0){document.getElementById('cd-days').textContent='🎊';return;}document.getElementById('cd-days').textContent=Math.floor(diff/86400000);document.getElementById('cd-hours').textContent=String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');document.getElementById('cd-mins').textContent=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');document.getElementById('cd-secs').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');}
  upd();setInterval(upd,1000);

  // Apply config
  document.getElementById("cfg-naam-a").textContent=CONFIG.naam_a;
  document.getElementById("cfg-naam-b").textContent=CONFIG.naam_b;
  document.getElementById("cfg-datum").textContent=CONFIG.datum_kort;
  document.getElementById("cfg-locatie").textContent=CONFIG.locatie;
  document.getElementById("cfg-namen-footer").textContent=CONFIG.naam_a+" & "+CONFIG.naam_b;
  const setT = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  setT("cfg-welkom-tijd",    CONFIG.welkom_tijd);
  setT("cfg-ceremonie-tijd", CONFIG.ceremonie_tijd);
  setT("cfg-ceremonie-loc",  CONFIG.ceremonie_loc);
  setT("cfg-receptie-tijd",  CONFIG.receptie_tijd);
  setT("cfg-receptie-loc",   CONFIG.receptie_loc);
  setT("cfg-diner-tijd",     CONFIG.diner_tijd);
  setT("cfg-dessert-tijd",   CONFIG.dessert_tijd);
  setT("cfg-openingsdans-tijd", CONFIG.openingsdans_tijd);
  setT("cfg-ontbijt-tijd",   CONFIG.ontbijt_van+" - "+CONFIG.ontbijt_tot);
  setT("cfg-parking",        CONFIG.parking);
</script>
