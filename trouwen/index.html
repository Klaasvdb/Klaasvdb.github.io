<script>

  function drawWheel(canvasEl,initColor){const ctx=canvasEl.getContext('2d'),cx=canvasEl.width/2,cy=canvasEl.height/2,r=cx-4;for(let a=0;a<360;a++){const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,'white');g.addColorStop(0.5,`hsl(${a},100%,50%)`);g.addColorStop(1,`hsl(${a},60%,30%)`);ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,(a-1)*Math.PI/180,(a+1)*Math.PI/180);ctx.closePath();ctx.fillStyle=g;ctx.fill();}const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.15);cg.addColorStop(0,'white');cg.addColorStop(1,'rgba(255,255,255,0)');ctx.beginPath();ctx.arc(cx,cy,r*0.15,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();}
  function pickColor(c,x,y){const cx=c.width/2,cy=c.height/2,r=cx-4,dx=x-cx,dy=y-cy;if(Math.sqrt(dx*dx+dy*dy)>r)return null;const p=c.getContext('2d').getImageData(x,y,1,1).data;return'#'+[p[0],p[1],p[2]].map(v=>v.toString(16).padStart(2,'0')).join('');}
  function bindWheel(canvasEl,swatchEl,labelEl,colorRef){
    let drag=false;
    const thumb=document.getElementById('thumbPreview');
    const thumbLabel=document.getElementById('thumbPreviewLabel');
    function showThumb(clientX,clientY,color){
      if(!thumb)return;
      thumb.style.background=color;
      thumb.style.left=clientX+'px';
      thumb.style.top=clientY+'px';
      thumb.classList.add('visible');
      if(thumbLabel){
        thumbLabel.textContent=color.toUpperCase();
        thumbLabel.style.left=clientX+'px';
        thumbLabel.style.top=clientY+'px';
        thumbLabel.classList.add('visible');
      }
    }
    function hideThumb(){if(thumb){thumb.classList.remove('visible');}if(thumbLabel){thumbLabel.classList.remove('visible');}}
    function handle(e,showPreview){
      const rect=canvasEl.getBoundingClientRect();
      const sx=canvasEl.width/rect.width,sy=canvasEl.height/rect.height;
      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      const x=(clientX-rect.left)*sx,y=(clientY-rect.top)*sy;
      const c=pickColor(canvasEl,Math.round(x),Math.round(y));
      if(c){colorRef.value=c;swatchEl.style.background=c;labelEl.textContent=c.toUpperCase();if(showPreview)showThumb(clientX,clientY,c);}
    }
    canvasEl.addEventListener('mousedown',(e)=>{drag=true;handle(e,false);});
    canvasEl.addEventListener('mousemove',(e)=>{if(drag)handle(e,false);});
    canvasEl.addEventListener('mouseup',()=>{drag=false;});
    canvasEl.addEventListener('mouseleave',()=>{drag=false;});
    canvasEl.addEventListener('touchstart',(e)=>{e.preventDefault();handle(e,true);},{passive:false});
    canvasEl.addEventListener('touchmove',(e)=>{e.preventDefault();handle(e,true);},{passive:false});
    canvasEl.addEventListener('touchend',()=>hideThumb());
    canvasEl.addEventListener('touchcancel',()=>hideThumb());
    swatchEl.style.background=colorRef.value;labelEl.textContent=colorRef.value.toUpperCase();
  }

  // PARALLAX
  (function() {
    const floats = document.querySelectorAll('.sketch-float');
    const speeds = [0.08,0.14,0.06,0.10,0.12,0.07,0.09,0.11,
                    0.05,0.13,0.08,0.10,0.06,0.09,0.07,0.11,0.13,0.05,0.08];
    const rotations = [3,-4,5,-3,4,-5,3,-4,2,-3,5,-4,3,-5,4,-3,5,-4,3];
    let ticking = false;

    function applyParallax() {
      const sy = window.scrollY;
      floats.forEach((el, i) => {
        const speed = speeds[i] || 0.08;
        const rot   = rotations[i] || 3;
        const ty    = sy * speed;
        const rx    = Math.sin(sy * 0.003 + i) * rot;
        el.style.transform = `translateY(${ty}px) rotate(${rx}deg)`;
      });
      ticking = false;
    }

    window.addEventListener('scroll', () => {
      if (!ticking) { requestAnimationFrame(applyParallax); ticking = true; }
    }, { passive: true });

    applyParallax();
  })();

  // Apply config
  document.getElementById('cfg-naam-a').textContent=CONFIG.naam_a;
  document.getElementById('cfg-naam-b').textContent=CONFIG.naam_b;
  document.getElementById('cfg-datum').textContent=CONFIG.datum_kort;
  document.getElementById('cfg-namen-footer').textContent=CONFIG.naam_a+' & '+CONFIG.naam_b;
  if(document.getElementById('cfg-deadline'))document.getElementById('cfg-deadline').textContent=CONFIG.deadline;
  const _setT = (id,val) => {{ const el=document.getElementById(id); if(el) el.textContent=val; }};
  _setT('cfg-welkom-tijd',     CONFIG.welkom_tijd);
  _setT('cfg-ceremonie-tijd',  CONFIG.ceremonie_tijd);
  _setT('cfg-ceremonie-loc',   CONFIG.ceremonie_loc);
  _setT('cfg-receptie-tijd',   CONFIG.receptie_tijd);
  _setT('cfg-receptie-loc',    CONFIG.receptie_loc);
  _setT('cfg-diner-tijd',      CONFIG.diner_tijd);
  _setT('cfg-dessert-tijd',    CONFIG.dessert_tijd);
  _setT('cfg-openingsdans-tijd',CONFIG.openingsdans_tijd);
  _setT('cfg-ontbijt-tijd',    CONFIG.ontbijt_van+' - '+CONFIG.ontbijt_tot);
  _setT('cfg-parking',         CONFIG.parking_naam + ' — ' + CONFIG.parking_adres);
  function generateICS(wrapper,dtstart,dtend,summary,description){
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//klanke.be//Trouwfeest//NL',
    'BEGIN:VEVENT',
    'UID:trouw-klanke-2026@klanke.be',
    'DTSTAMP:'+new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z',
    'DTSTART;TZID=Europe/Brussels:'+dtstart,
    'DTEND;TZID=Europe/Brussels:'+dtend,
    'SUMMARY:'+summary,
    'DESCRIPTION:'+description,
    'LOCATION:'+(CONFIG.locatie_naam+', '+CONFIG.locatie_adres),
    'BEGIN:VALARM','TRIGGER:-P7D','ACTION:DISPLAY',
    'DESCRIPTION:Nog 1 week tot het feest! 🎊',
    'END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));
  a.download='trouw-klanke.ics';
  a.className='ics-btn';
  a.innerHTML='📅 &nbsp;Voeg toe aan agenda';
  wrapper.appendChild(a);
}
  
  function showSuccess(emoji,title,text,showICS){
  document.getElementById('form-content').style.display='none';
  document.getElementById('success-msg').style.display='block';
  document.getElementById('success-emoji').textContent=emoji;
  document.getElementById('success-title').textContent=title;
  document.getElementById('success-text').textContent=text;
  if(showICS) generateICS(
    document.getElementById('ics-wrapper'),
    CONFIG.ics_dtstart,
    CONFIG.ics_dtend,
    '💍 ' + CONFIG.naam_a + ' & ' + CONFIG.naam_b,
    CONFIG.welkom_tijd    + ' Welkom'
    +'\n'+ CONFIG.ceremonie_tijd + ' Ceremonie (' + CONFIG.ceremonie_loc + ')'
    +'\n'+ CONFIG.receptie_tijd  + ' Receptie ('  + CONFIG.receptie_loc  + ')'
    +'\n'+ CONFIG.diner_tijd     + ' Diner'
    +'\n'+ CONFIG.dessert_tijd   + ' Dessert & Openingsfeest'
    +'\n'+ CONFIG.openingsdans_tijd + ' Openingsdans'
  );
}
  function shake(id){const el=document.getElementById(id);el.style.animation='shake 0.4s';el.addEventListener('animationend',()=>{el.style.animation='';},{once:true});el.focus();}

  let attend=null,partner=null,camping=null,ontbijt=null;

  let wheelsDrawn=false;

  function setAttend(val){
    attend=val;
    document.getElementById('btn-yes').className='tog-btn'+(val==='yes'?' yes':'');
    document.getElementById('btn-no').className='tog-btn'+(val==='no'?' no':'');

  function setPartner(val){
    partner=val;
    document.getElementById('btn-solo').className='tog-btn'+(val==='solo'?' sel':'');

  function setCamping(val){

    document.getElementById('btn-camp').className='tog-btn'+(val==='yes'?' camp':'');
    document.getElementById('btn-nocamp').className='tog-btn'+(val==='no'?' nocamp':'');
    document.getElementById('camping-extra').classList.toggle('hidden',val!=='yes');
    if(val!=='yes'){ontbijt=null;document.getElementById('btn-ont-yes').className='tog-btn';document.getElementById('btn-ont-no').className='tog-btn';}

  function setOntbijt(val){
    ontbijt=val;

  async function submitForm(){
    const naam=document.getElementById('naam').value.trim();
    const email=document.getElementById('email').value.trim();
    if(!naam){shake('naam');return;}
    if(!email){shake('email');return;}
    if(!attend){alert('Laat ons weten of je aanwezig bent! 🥺');return;}
    if(attend==='yes'&&!partner){alert('Kom je alleen of met partner? 👫');return;}
    if(attend==='yes'&&!camping){alert('Zou je willen slapen op de camping? ⛺');return;}
    if(attend==='yes'&&camping==='yes'&&!ontbijt){alert('Wil je ontbijt? 🍳');return;}
    const data={
      type:'trouwen',naam,email,aanwezig:attend,
      partner:partner||null,
      partner_naam:attend==='yes'&&partner==='partner'?document.getElementById('partner-naam').value.trim():null,
      camping:camping||null,ontbijt:ontbijt||null,
      tent_info:camping==='yes'?document.getElementById('tent-info').value.trim():null,
      kleur:attend==='yes'?color1.value:null,
      partner_kleur:attend==='yes'&&partner==='partner'?color2.value:null,
      dieet: document.getElementById('dieet').value.trim()||null,
      bericht:document.getElementById('bericht').value.trim()||null
    };
    const ok=await saveRSVP(data);
    if(!ok){alert('Er ging iets mis. Probeer opnieuw!');return;}
    const voornaam=naam.split(' ')[0];
    if(attend==='yes'){
      showSuccess("🎉","Joepie, "+voornaam+"!","We kunnen niet wachten om je te zien! Tot 4 juli! 💕",true);
    } else {
      showSuccess("💌","Bedankt, "+voornaam+".","Jammer dat je er niet bij kan zijn. Bedankt om iets te laten weten! 💛",false);
    }
  }
