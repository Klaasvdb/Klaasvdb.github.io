<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Trouw Klanke — Uitnodiging</title>
<style>
  :root {
    --paper: #fdfcf7;
    --bg-1: #e8e0d2;
    --bg-2: #d4c8b3;
    --ink: #2a3a52;
    --accent: #8a7a5a;
    --rsvp: #c54a6c;

    /* Native image aspect ratios */
    --single-ratio: calc(642 / 909);    /* ~0.7063 — image 1 & 3 */
    --spread-ratio: calc(1265 / 904);   /* ~1.3993 — image 2 */

    /* Reserve vertical space for nav + hint + padding (about 200px) */
    --reserved-v: 220px;
    /* Available page height: viewport minus reserved space */
    --page-h: calc(100vh - var(--reserved-v));
    /* Cap on page width = 92vw, then derive height from aspect ratio if needed */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: radial-gradient(ellipse at center, var(--bg-1) 0%, var(--bg-2) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* The stage holds three positioned views, only one visible at a time. */
  .stage {
    position: relative;
    z-index: 1;
    /* Height = available height. Width is whatever the active view needs (auto via flex). */
    height: var(--page-h);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Each view */
  .view {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.96);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.45s ease, transform 0.45s ease, visibility 0.45s;
  }

  .view.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
  }

  .img-wrap {
    position: relative;
    height: 100%;
    /* Cap by viewport width — 92vw — and let height adjust to keep ratio. */
    max-width: 92vw;
  }

  .view img {
    display: block;
    height: 100%;
    width: auto;
    /* Make sure on narrow viewports the image scales down by width too */
    max-width: 92vw;
    object-fit: contain;
    box-shadow: 0 10px 40px rgba(40,30,20,0.3);
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Center binding line on the spread */
  .view-spread .img-wrap::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 6px;
    transform: translateX(-50%);
    background: linear-gradient(to right,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.30) 50%,
      rgba(0,0,0,0.18) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* Page-curl hint */
  .page-curl {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 60px;
    height: 60px;
    background: linear-gradient(225deg,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.05) 30%,
      transparent 50%);
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 3;
  }

  .img-wrap:hover .page-curl {
    width: 90px;
    height: 90px;
  }

  /* Soft shadow under the active view */
  .stage::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 5%;
    right: 5%;
    height: 30px;
    background: radial-gradient(ellipse at center, rgba(40,30,20,0.35) 0%, transparent 70%);
    filter: blur(8px);
    z-index: -1;
  }

  /* Make views clickable for forward nav */
  .view-cover, .view-spread {
    cursor: pointer;
  }

  /* Clickable QR area on the back cover (image 3) */
  .qr-link {
    position: absolute;
    left: 38%;
    top: 60%;
    width: 28%;
    height: 22%;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s ease, transform 0.2s ease;
    z-index: 5;
  }

  .qr-link:hover {
    background: rgba(74, 119, 167, 0.15);
    transform: scale(1.03);
  }

  /* ---- RSVP button on the back-cover view ---- */
  .rsvp-wrap {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    /* Sits just below the booklet, but inside the reserved area */
    height: var(--reserved-v);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 1.8rem;
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .rsvp-wrap.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .rsvp-btn {
    background: var(--rsvp);
    color: #fff;
    text-decoration: none;
    font-family: Georgia, serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.95rem 2.4rem;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(197, 74, 108, 0.4);
    transition: all 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
  }

  .rsvp-btn:hover {
    background: #b03c5e;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(197, 74, 108, 0.5);
  }

  .rsvp-btn:active {
    transform: translateY(0);
  }

  .rsvp-btn::after {
    content: '→';
    font-size: 1.1rem;
  }

  /* Hint */
  .hint {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.78rem;
    color: var(--ink);
    opacity: 0.55;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: Georgia, serif;
    z-index: 1;
    text-align: center;
    transition: opacity 0.3s ease;
  }

  .hint.dim {
    opacity: 0;
  }
</style>
</head>

  <!-- RSVP button below the booklet, only visible on page 3 -->
  <div class="rsvp-wrap" id="rsvpWrap">
    <a class="rsvp-btn"
       href="https://klanke.be/dansen"
       target="_blank"
       rel="noopener">
      Stuur RSVP
    </a>
  </div>

  <div class="hint" id="hint">Klik op het boekje om verder te bladeren</div>

<script>
  const views = document.querySelectorAll('.view');
  const rsvpWrap = document.getElementById('rsvpWrap');
  const hint = document.getElementById('hint');

  let current = 1;
  const total = views.length;

  function show(page) {
    if (page < 1) page = 1;
    if (page > total) page = total;
    current = page;

    views.forEach(v => {
      const p = parseInt(v.dataset.page, 10);
      v.classList.toggle('active', p === current);
    });

    // RSVP button only on the last page
    rsvpWrap.classList.toggle('visible', current === total);

    // Hide hint on last page (since the action is the RSVP button)
    hint.classList.toggle('dim', current === total);
  }

  // Forward nav: clicking on cover or spread advances
  document.querySelectorAll('.view-cover, .view-spread').forEach(v => {
    v.addEventListener('click', () => show(current + 1));
  });

  // Clicking on the back-cover image area (but NOT the QR link) goes back to start.
  // We still allow keyboard nav for going backwards.
  document.querySelector('.view-back .img-wrap').addEventListener('click', (e) => {
    if (e.target.closest('.qr-link')) return; // let QR link handle its own click
    show(1); // loop back to cover
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { show(current + 1); e.preventDefault(); }
    else if (e.key === 'ArrowLeft') show(current - 1);
    else if (e.key === 'Home') show(1);
  });

  show(1);
</script>
