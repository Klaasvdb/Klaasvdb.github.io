<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouw Klanke – Avondfeest</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(100,160,200,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(180,120,180,0.08) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(120,180,120,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  h1 {
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #5a6e7f;
    margin-bottom: 24px;
    letter-spacing: 0.08em;
    text-align: center;
    font-weight: normal;
    font-style: italic;
  }

  .hint {
    margin-top: 20px;
    font-size: 0.85rem;
    color: #8a9aaa;
    letter-spacing: 0.05em;
    text-align: center;
    transition: opacity 0.4s;
  }
  .hint.hidden { opacity: 0; pointer-events: none; }

  .scene {
    perspective: 1800px;
    width: min(92vw, 820px);
    aspect-ratio: 2 / 1;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform-origin: center center;
    transition: transform 1.1s cubic-bezier(0.77, 0, 0.18, 1);
    cursor: pointer;
    border-radius: 4px;
  }

  .card.open {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 4px;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow:
      0 4px 8px rgba(0,0,0,0.12),
      0 12px 32px rgba(0,0,0,0.18),
      0 2px 4px rgba(0,0,0,0.08);
  }

  .face.front { background: #fff; }

  .face.back {
    background: #fff;
    transform: rotateY(180deg);
  }

  .face embed {
    width: 100%;
    height: 100%;
    display: block;
    border: none;
  }

  .face.front::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 50%; width: 4px;
    background: linear-gradient(to right, rgba(0,0,0,0.12), rgba(0,0,0,0.04));
    pointer-events: none;
    transition: opacity 0.5s;
  }
  .card.open .face.front::after { opacity: 0; }

  .face.back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(255,255,255,0.5) 0%, transparent 60%);
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    border-radius: 4px;
  }
  .card.open .face.back::before {
    animation: shimmer 0.8s 0.5s ease-out forwards;
  }
  @keyframes shimmer {
    0%   { opacity: 0.7; transform: translateX(-100%); }
    100% { opacity: 0;   transform: translateX(100%); }
  }

  .envelope-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    z-index: 5;
    animation: envAppear 1s ease-out forwards;
    pointer-events: none;
  }
  .envelope-hint svg { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .envelope-hint span {
    font-size: clamp(0.75rem, 2vw, 1rem);
    color: #5a7a8a;
    letter-spacing: 0.1em;
    font-style: italic;
  }
  @keyframes envAppear {
    0%   { opacity: 0; transform: scale(0.8); }
    40%  { opacity: 1; transform: scale(1); }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }
  .card.open .envelope-hint { display: none; }

  .hearts-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    display: none;
  }
  .hearts-container.active { display: block; }
  .heart {
    position: absolute;
    bottom: -40px;
    font-size: 1.5rem;
    animation: floatUp 3s ease-out forwards;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translateY(-80vh) rotate(20deg); opacity: 0; }
  }

  @media (max-width: 480px) {
    .scene { aspect-ratio: 1 / 1.4; }
  }
</style>
</head>
<body>

<h1>Je bent uitgenodigd&nbsp;&nbsp;✉</h1>

<div class="scene">
  <div class="card" id="card">

    <div class="face front">
      <div class="envelope-hint" aria-hidden="true">
        <svg width="64" height="48" viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="60" height="44" rx="4" stroke="#5a7a9a" stroke-width="2.5" fill="white" fill-opacity="0.6"/>
          <path d="M2 6 L32 26 L62 6" stroke="#5a7a9a" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M2 42 L22 24" stroke="#5a7a9a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          <path d="M62 42 L42 24" stroke="#5a7a9a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <span>klik om te openen</span>
      </div>
      <embed src="/images/Uitnodiging KLANKE_recto-avondgasten.pdf#toolbar=0&navpanes=0&scrollbar=0&view=Fit" type="application/pdf">
    </div>

    <div class="face back">
      <embed src="/images/Uitnodiging KLANKE_verso-avondgasten.pdf#toolbar=0&navpanes=0&scrollbar=0&view=Fit" type="application/pdf">
    </div>

  </div>
</div>

<p class="hint" id="hint">Klik op het kaartje om het te openen</p>

<div class="hearts-container" id="hearts"></div>

<script>
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');
  const heartsEl = document.getElementById('hearts');
  let opened = false;

  card.addEventListener('click', () => {
    opened = !opened;
    card.classList.toggle('open', opened);
    hint.classList.toggle('hidden', opened);

    if (opened) {
      launchHearts();
      setTimeout(() => heartsEl.classList.remove('active'), 3500);
    }
  });

  function launchHearts() {
    heartsEl.classList.add('active');
    const symbols = ['♥', '♡', '✿', '✦'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.animationDelay = (Math.random() * 1.2) + 's';
      h.style.animationDuration = (2.2 + Math.random() * 1.2) + 's';
      h.style.color = ['#c06090','#5a8fc0','#7ab870','#d4a050'][Math.floor(Math.random()*4)];
      h.style.fontSize = (1 + Math.random()) + 'rem';
      heartsEl.appendChild(h);
      h.addEventListener('animationend', () => h.remove());
    }
  }
</script>
</body>
</html>
