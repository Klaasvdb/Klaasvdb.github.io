<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouw Klanke – Hele dag</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #f8f5f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.scene {
  perspective: 1400px;
  width: min(84vw, 340px);
}

.book {
  position: relative;
  width: 100%;
  transform-style: preserve-3d;
}

.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  background: #fff;
  border-radius: 3px;
  overflow: hidden;
  transform-origin: left center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  cursor: pointer;
}

.page.on-top {
  box-shadow:
    0 3px 6px rgba(0,0,0,0.07),
    0 12px 32px rgba(0,0,0,0.13),
    0 28px 60px rgba(0,0,0,0.07);
}

.page img {
  width: 100%;
  display: block;
  height: auto;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

.rsvp-link {
  position: absolute;
  left: 18%; width: 52%;
  top: 53%;  height: 30%;
  display: block;
  z-index: 10;
  border-radius: 4px;
}

.open-hint {
  position: absolute;
  bottom: 16px; left: 0; right: 0;
  text-align: center;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: #8a8078;
  font-family: Georgia, serif;
  font-style: italic;
  pointer-events: none;
  transition: opacity 0.4s;
}

.dots {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #d0c8c0;
  border: none; padding: 0;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}
.dot.active { background: #607888; transform: scale(1.4); }

.hearts { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
.heart {
  position: absolute;
  bottom: -20px;
  animation: rise 2.8s ease-out forwards;
  pointer-events: none;
}
@keyframes rise {
  to { opacity: 0; transform: translateY(-75vh) rotate(20deg) scale(0.4); }
}
</style>
</head>
<body>

<div class="scene">
  <div class="book" id="book">
    <div class="page" id="p3" style="z-index:1">
      <img src="/images/Uitnodiging KLANKE 3 hele dag.png" alt="Praktische info">
      <a class="rsvp-link"
         href="https://klanke.be/trouwen"
         target="_blank"
         rel="noopener"
         aria-label="Bevestig aanwezigheid via klanke.be/trouwen"></a>
    </div>
    <div class="page" id="p2" style="z-index:2">
      <img src="/images/Uitnodiging KLANKE 2 hele dag.png" alt="Locatie en programma">
    </div>
    <div class="page on-top" id="p1" style="z-index:3">
      <img src="/images/Uitnodiging KLANKE 1.png" alt="Voorkant Trouw Klanke">
      <span class="open-hint" id="hint">klik om te openen</span>
    </div>
  </div>
</div>

<div class="dots" role="tablist">
  <button class="dot active" data-page="0" aria-label="Pagina 1"></button>
  <button class="dot"        data-page="1" aria-label="Pagina 2"></button>
  <button class="dot"        data-page="2" aria-label="Pagina 3"></button>
</div>

<div class="hearts" id="hearts" aria-hidden="true"></div>

<script>
const book      = document.getElementById('book');
const hint      = document.getElementById('hint');
const heartsEl  = document.getElementById('hearts');
const dots      = document.querySelectorAll('.dot');
const pageEls   = ['p1','p2','p3'].map(id => document.getElementById(id));
const imgs      = pageEls.map(p => p.querySelector('img'));

let current   = 0;
let animating = false;
let heights   = [0, 0, 0];

let loadCount = 0;
function tryInit() {
  if (++loadCount < imgs.length) return;
  const w = book.offsetWidth;
  heights = imgs.map(img => Math.round(w * img.naturalHeight / img.naturalWidth));
  book.style.height = heights[0] + 'px';
}
imgs.forEach(img => {
  if (img.complete && img.naturalWidth) tryInit();
  else img.addEventListener('load', tryInit);
});

window.addEventListener('resize', () => {
  const w = book.offsetWidth;
  heights = imgs.map(img => Math.round(w * img.naturalHeight / img.naturalWidth));
  book.style.transition = 'none';
  book.style.height = heights[current] + 'px';
});

function updateDots() {
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
}

function setHeight(h) {
  book.style.transition = 'height 0.22s ease';
  book.style.height = h + 'px';
}

function advance() {
  if (animating || current >= pageEls.length - 1) return;
  animating = true;

  const out = pageEls[current];
  hint.style.opacity = '0';
  hint.style.pointerEvents = 'none';

  out.style.transition    = 'transform 0.62s cubic-bezier(0.4, 0, 0.6, 1)';
  out.style.transform     = 'rotateY(-180deg)';
  out.style.pointerEvents = 'none';
  out.classList.remove('on-top');

  setTimeout(() => {
    current++;
    setHeight(heights[current]);
    pageEls[current].classList.add('on-top');
    updateDots();
    spawnHearts();
  }, 310);

  setTimeout(() => { animating = false; }, 680);
}

function retreat() {
  if (animating || current <= 0) return;
  animating = true;

  const incoming = pageEls[current - 1];
  pageEls[current].classList.remove('on-top');
  setHeight(heights[current - 1]);

  setTimeout(() => {
    incoming.style.transition    = 'transform 0.55s cubic-bezier(0.4, 0, 0.6, 1)';
    incoming.style.transform     = 'rotateY(0deg)';
    incoming.style.pointerEvents = 'auto';
    incoming.classList.add('on-top');
    current--;
    updateDots();
  }, 30);

  setTimeout(() => { animating = false; }, 620);
}

pageEls.forEach(p => {
  p.addEventListener('click', e => {
    if (e.target.tagName === 'A') return;
    advance();
  });
});

dots.forEach(d => d.addEventListener('click', () => {
  const t = +d.dataset.page;
  if (t > current) advance();
  else if (t < current) retreat();
}));

let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (dx < -40) advance();
  else if (dx > 40) retreat();
});

function spawnHearts() {
  const syms = ['♥','♡','✦','✿'];
  const cols = ['#c06090','#5a8fc0','#7ab870','#d4a050'];
  for (let i = 0; i < 10; i++) {
    const h = document.createElement('span');
    h.className = 'heart';
    h.textContent = syms[i % 4];
    h.style.left           = (8 + Math.random() * 84) + 'vw';
    h.style.animationDelay = (Math.random() * 0.6) + 's';
    h.style.color          = cols[Math.floor(Math.random() * 4)];
    h.style.fontSize       = (0.9 + Math.random() * 0.7) + 'rem';
    heartsEl.appendChild(h);
    h.addEventListener('animationend', () => h.remove());
  }
}
</script>
</body>
</html>
